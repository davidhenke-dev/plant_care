name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  test:
    name: Test & Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          channel: stable
          cache: true

      - name: Dependencies installieren
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Tests ausführen
        run: flutter test

  build:
    name: Build iOS
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          channel: stable
          cache: true

      - name: Dependencies installieren
        run: flutter pub get

      - name: CocoaPods installieren
        run: cd ios && pod install

      - name: iOS Build (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Runner.app als Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Runner-${{ github.sha }}
          path: build/ios/iphoneos/Runner.app
          retention-days: 7

  # Nur bei Release: IPA signieren und AltStore-Source aktualisieren
  release:
    name: Release AltStore
    needs: build
    runs-on: macos-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          channel: stable
          cache: true

      - name: Dependencies installieren
        run: flutter pub get

      - name: CocoaPods installieren
        run: cd ios && pod install

      - name: Zertifikat importieren
        env:
          P12_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_P12 }}
          P12_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          echo "$P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-keychain-settings build.keychain
          security unlock-keychain -p "" build.keychain
          security list-keychains -d user -s build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: IPA bauen und signieren
        run: |
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist

      - name: IPA in GitHub Release hochladen
        uses: softprops/action-gh-release@v2
        with:
          files: build/ios/ipa/*.ipa

      - name: AltStore Source aktualisieren
        env:
          VERSION: ${{ github.event.release.tag_name }}
          DOWNLOAD_URL: ${{ github.event.release.html_url }}
        run: |
          python3 scripts/update_altstore_source.py \
            --version "$VERSION" \
            --download-url "$DOWNLOAD_URL"

      - name: Source-Datei committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add altstore-source.json
          git commit -m "chore: update AltStore source for ${{ github.event.release.tag_name }}"
          git push
